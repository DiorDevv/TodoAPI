# =============================================================
# NGINX - Reverse Proxy konfiguratsiyasi
# =============================================================
# Internet -> Nginx (port 80) -> Django (port 8000)
# Static/media fayllar to'g'ridan-to'g'ri nginx beradi (tezroq)
# =============================================================

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Log format
    log_format main '$remote_addr - $request - $status '
                    '$body_bytes_sent "$http_referer"';

    # Upstream - Django container ga yo'naltirish
    upstream django_app {
        server web:8000;  # docker-compose service nomi:port
    }

    server {
        listen 80;
        server_name localhost;

        # So'rov hajmi chegarasi (fayl yuklash uchun)
        client_max_body_size 10M;

        # Static fayllar - Nginx o'zi beradi (Django ga bormaydi)
        location /static/ {
            alias /app/staticfiles/;
            expires 30d;
            add_header Cache-Control "public, immutable";
        }

        # Media fayllar
        location /media/ {
            alias /app/media/;
            expires 7d;
        }

        # Barcha boshqa so'rovlar Django ga
        location / {
            proxy_pass http://django_app;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Timeout sozlamalari
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }
    }
}
