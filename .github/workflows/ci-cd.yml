# =============================================================
# GITHUB ACTIONS - CI/CD Pipeline
# =============================================================
# Qachon ishga tushadi:
#   - main yoki develop branch ga push bo'lganda
#   - Har qanday Pull Request ochilganda
#
# Bosqichlar:
#   1. CI: Test + Lint (barcha push/PR larda)
#   2. CD: Docker build + push + deploy (faqat main da)
# =============================================================

name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

# Environment variables (hamma jobda ishlatiladi)
env:
  DOCKER_IMAGE: ${{ secrets.DOCKER_USERNAME }}/todoapi
  DOCKER_TAG: ${{ github.sha }}  # Har commit uchun unique tag

jobs:

  # ============================================================
  # JOB 1: CI - Test va Lint
  # ============================================================
  test:
    name: Test & Lint
    runs-on: ubuntu-latest

    # PostgreSQL service container (test uchun)
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: test_todoapp
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        # Container tayyor bo'lguncha kutish
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      # 1. Kodni olish
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Python o'rnatish
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          # pip cache - bir xil requirements bo'lsa tezroq
          cache: pip

      # 3. Kutubxonalar o'rnatish
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8 black

      # 4. Linting - kod uslubini tekshirish
      - name: Lint with flake8
        run: |
          # Sintaksis xatolar va undefined names (E9,F63,F7,F82)
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          # Style muammolar - warning (xato chiqarmaydi)
          flake8 . --count --max-line-length=120 --statistics

      # 5. Format tekshirish
      - name: Check formatting with black
        run: black --check --line-length 120 .

      # 6. Testlarni ishga tushirish
      - name: Run tests
        env:
          SECRET_KEY: test-secret-key-for-ci
          DEBUG: "True"
          POSTGRES_DB: test_todoapp
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_HOST: localhost
          POSTGRES_PORT: 5432
          # Redis yo'q bo'lsa locmem cache ishlatadi
          REDIS_URL: ""
        run: |
          python manage.py migrate --noinput
          python manage.py test app.api.tests --verbosity=2

  # ============================================================
  # JOB 2: CD - Build va Deploy
  # Faqat main branch ga push bo'lganda (PR emas)
  # ============================================================
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    needs: test  # test job muvaffaqiyatli bo'lgandan keyin
    # MUHIM: Faqat main branch va PR emas
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      # 1. Kodni olish
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Docker Buildx (multi-platform build uchun)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 3. Docker Hub ga login
      # Secrets: Settings > Secrets > Actions da qo'shiladi
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}  # Token (parol emas)

      # 4. Docker image build va push
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          target: production  # Multi-stage: production stage
          tags: |
            ${{ env.DOCKER_IMAGE }}:latest
            ${{ env.DOCKER_IMAGE }}:${{ env.DOCKER_TAG }}
          # Layer cache - tezroq build
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # 5. Serverga deploy (SSH orqali)
      # Secrets: SSH_HOST, SSH_USER, SSH_PRIVATE_KEY
      - name: Deploy to production server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # Serverda loyiha papkasiga o'tish
            cd /opt/todoapi

            # Yangi image ni tortib olish
            docker pull ${{ env.DOCKER_IMAGE }}:${{ env.DOCKER_TAG }}

            # docker-compose.yml dagi image ni yangilash
            export DOCKER_TAG=${{ env.DOCKER_TAG }}
            export DOCKER_IMAGE=${{ env.DOCKER_IMAGE }}

            # Zero-downtime restart:
            # 1. Migratsiyalarni yangi containerda ishlatish
            docker compose run --rm web python manage.py migrate --noinput

            # 2. Web serviceni yangilash (bir necha soniya downtime)
            docker compose up -d --no-deps web nginx

            # 3. Eski image larni tozalash
            docker image prune -f

      # 6. Deployment haqida xabar berish (ixtiyoriy)
      - name: Notify deployment success
        if: success()
        run: |
          echo "✅ Deploy muvaffaqiyatli: ${{ env.DOCKER_IMAGE }}:${{ env.DOCKER_TAG }}"
          # Slack/Telegram notification qo'shish mumkin
